<header>
  <div class="logo">Tech<span>Shop</span></div>
  <nav>
    <a routerLink="/">Home</a>
    <a routerLink="/catalog">Products</a>
    @if (loggedIn) {
    <a (click)="logOut()">Log out</a>
    <a routerLink="/user">Account</a>
    <a routerLink="/contact">Contact</a>
    @if (isAdmin){
    <a routerLink="/admin">Admin Panel</a>
    }
    <div type="button" class="btn btn-primary btn-sm rounded-5 m-1" id="cartBtn" routerLink="/user">
      🛒 {{cartCount}}
    </div>
    }@else {
    <a routerLink="/login">Log in</a>
    <a routerLink="/register">Register</a>
    }
    <button type="button" class="btn btn-primary btn-sm rounded-5 m-1" (click)="theme.toggle()">
      {{ theme.isDark() ? '☀️ Light' : '🌙 Dark' }}
    </button>
  </nav>
</header>
