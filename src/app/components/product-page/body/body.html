<div class="container d-flex justify-content-center align-items-center page-wrapper">
  <div class="card p-4 shadow-sm text-center detail-card">
    <h2 class="card-title mb-3 product-name">{{ product?.name }}</h2>
    <img [src]="product?.imageUrl || 'https://via.placeholder.com/250x150'" 
         alt="{{ product?.name }}" 
         class="img-fluid rounded mb-3" 
         style="object-fit: cover; border-radius: 15px;">
    <h4 class="mb-3 product-price">{{ product?.price }}$</h4>
    <p class="text-muted mb-4" style="font-size: 0.9rem; color: var(--text);">{{ product?.description }}</p>
    <div class="d-flex justify-content-center mt-4">
      <button class="btn btn-outline-primary back-btn" (click)="goBack()">
        Înapoi
      </button>
    </div>
  </div>
</div>
